<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youme - Modern MP3 Downloader</title>
    <!-- Google Fonts & FontAwesome -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary: #ff416c;
        --secondary: #ff4b2b;
        --bg-dark: #0f0c29;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        overflow-x: hidden;
      }

      /* Dekorasi Background Bulat */
      .circle {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        filter: blur(80px);
        z-index: -1;
        opacity: 0.4;
      }

      .c1 {
        width: 300px;
        height: 300px;
        top: -50px;
        left: -50px;
      }
      .c2 {
        width: 250px;
        height: 250px;
        bottom: -50px;
        right: -50px;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      .glass-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px 30px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      h1 {
        font-weight: 800;
        font-size: 2rem;
        margin-bottom: 10px;
        background: -webkit-linear-gradient(var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        font-size: 0.9rem;
        opacity: 0.7;
        margin-bottom: 30px;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      input[type="text"] {
        width: 100%;
        padding: 15px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        transition: 0.3s;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 15px rgba(255, 65, 108, 0.3);
      }

      .btn-main {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        color: white;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s transform;
      }

      .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
      }

      /* Video Info Card */
      .video-card {
        margin-top: 30px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        animation: slideUp 0.5s ease-out;
      }

      .thumbnail-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
      }

      .thumbnail-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .video-details {
        padding: 20px;
        text-align: left;
      }

      .video-title {
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Progress Bar Modern */
      #downloadProgress {
        display: none;
        margin-top: 15px;
      }

      .loader {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }

      .loader-bar {
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        position: absolute;
        animation: loading 1.5s infinite ease-in-out;
      }

      @keyframes loading {
        0% {
          left: -50%;
        }
        100% {
          left: 100%;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .error-msg {
        color: #ff4b2b;
        font-size: 0.8rem;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="container">
      <div class="glass-card">
        <h1>Youme</h1>
        <p class="subtitle">Convert YouTube videos to high-quality MP3</p>

        <form method="POST">
          <div class="input-group">
            <input
              type="text"
              name="url"
              placeholder="Paste YouTube link here..."
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="btn-main">
            <i class="fa-solid fa-magnifying-glass"></i> &nbsp; Fetch Video
          </button>
        </form>

        {% if error %}
        <p class="error-msg">
          <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
        </p>
        {% endif %} {% if video_info %}
        <div class="video-card">
          <div class="thumbnail-wrapper">
            <img src="{{ video_info.thumbnail }}" alt="Thumbnail" />
          </div>
          <div class="video-details">
            <div class="video-title">{{ video_info.title }}</div>
            <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 15px">
              <i class="fa-regular fa-clock"></i> {{ video_info.duration // 60
              }}:{{ "%02d" % (video_info.duration % 60) }}
            </p>

            <button
              id="dl-btn"
              class="btn-main"
              onclick="startDownload('{{ video_info.url }}')"
              style="background: white; color: black"
            >
              <i class="fa-solid fa-download"></i> &nbsp; Download MP3
            </button>

            <div id="downloadProgress">
              <p
                style="
                  font-size: 0.8rem;
                  margin-bottom: 8px;
                  text-align: center;
                "
              >
                Converting your audio...
              </p>
              <div class="loader">
                <div class="loader-bar"></div>
              </div>
            </div>
          </div>
        </div>
        {% endif %}
      </div>
    </div>

    <script>
      function startDownload(url) {
        const btn = document.getElementById("dl-btn");
        const loader = document.getElementById("downloadProgress");

        btn.style.display = "none";
        loader.style.display = "block";

        const formData = new FormData();
        formData.append("url", url);

        fetch("/download", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success) {
              window.location.href = `/download/${encodeURIComponent(data.filename)}`;
              setTimeout(() => {
                btn.style.display = "block";
                loader.style.display = "none";
              }, 2000);
            } else {
              alert("Error: " + data.error);
              btn.style.display = "block";
              loader.style.display = "none";
            }
          })
          .catch((error) => {
            alert("Network error: " + error);
            btn.style.display = "block";
            loader.style.display = "none";
          });
      }
    </script>
  </body>
</html>
